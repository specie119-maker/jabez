name: YouTube Shorts Automation Daily

on:
  schedule:
    # 매일 UTC 기준 09:00 (한국 시간 오후 6시) 자동 실행
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  automate_and_upload_shorts:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 저장소 체크아웃
        uses: actions/checkout@v4
        
      - name: 2. Node.js & FFmpeg 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
        
      - name: 3. Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 4. 의존성 패키지 설치
        run: |
          npm install
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
          
      - name: 5. 인증 키 및 토큰 복원 (Github Secrets에서)
        run: |
          echo '${{ secrets.CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_OAUTH_TOKEN }}' > token.json
          echo '${{ secrets.GEMINI_API_KEY }}' > "제미나이 키.txt"
          
      - name: 5.5. 새로운 AI 음악 작곡 (쇼츠 BGM용)
        run: python generate_music_lyria.py
        
      - name: 6. 쇼츠 영상 생성 (FFmpeg)
        run: node build_user_shorts.js
        
      - name: 7. 쇼츠 유튜브 업로드 실행
        run: python upload_shorts.py
        
      - name: 8. 보안 정보 파기
        if: always()
        run: rm -f client_secret.json token.json
