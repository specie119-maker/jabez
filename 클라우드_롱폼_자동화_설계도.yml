name: YouTube Long-Form Automation Daily

on:
  schedule:
    # 매일 UTC 기준 00:00 (한국 시간 오전 9시) 1회 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  automate_and_upload_longform:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 저장소 체크아웃
        uses: actions/checkout@v4
        
      - name: 2. Node.js & FFmpeg 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: FFmpeg 설치
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
        
      - name: 3. Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 4. 의존성 패키지 설치
        run: |
          npm install
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib google-genai
          
      - name: 5. 인증 키 및 토큰 복원 (Github Secrets 연결)
        run: |
          echo '${{ secrets.CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_OAUTH_TOKEN }}' > token.json
          echo '${{ secrets.GEMINI_API_KEY }}' > "제미나이 키.txt"
          
      - name: 6. 1단계 - Google Lyria 3 모듈 음악 작곡 (1시간 분량)
        run: python generate_music_lyria.py
        
      - name: 7. 2단계 - 1시간 롱영상 렌더링 (Node.js & FFmpeg)
        run: node build_real_1hour.js
        
      - name: 8. 3단계 - 타임라인 추출
        run: node generate_timeline2.js
        
      - name: 9. 4단계 - 유튜브 1시간 영상 자동 업로드
        run: python upload_youtube.py
        
      - name: 10. 보안 세션 파기
        if: always()
        run: rm -f client_secret.json token.json "제미나이 키.txt"
